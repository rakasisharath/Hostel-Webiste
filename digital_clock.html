<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            flex-direction: column;\n            height: 100vh;\n            background-color: #f0f0f0;\n        }\n        #clock {\n            font-size: 2rem;\n            margin: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div id=\"clock\"></div>\n    <script>\n        function updateClock() {\n            const utcDate = new Date();\n            const options = {\n                timeZone: \"UTC\",\n                hour: \"2-digit\",\n                minute: \"2-digit\",\n                second: \"2-digit\",\n                hour12: false\n            };\n            const formatterUTC = new Intl.DateTimeFormat(\"en-US\", options);\n            const utcTime = formatterUTC.format(utcDate);\n\n            options.timeZone = \"America/New_York\";\n            const formatterNY = new Intl.DateTimeFormat(\"en-US\", options);\n            const nyTime = formatterNY.format(utcDate);\n\n            options.timeZone = \"Europe/London\";\n            const formatterLondon = new Intl.DateTimeFormat(\"en-US\", options);\n            const londonTime = formatterLondon.format(utcDate);\n\n            options.timeZone = \"Asia/Kolkata\";\n            const formatterKolkata = new Intl.DateTimeFormat(\"en-US\", options);\n            const kolkataTime = formatterKolkata.format(utcDate);\n\n            document.getElementById(\"clock\").innerHTML = \"UTC: \" + utcTime + \" | New York: \" + nyTime + \" | London: \" + londonTime + \" | Kolkata: \" + kolkataTime;\n        }\n\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>\n
